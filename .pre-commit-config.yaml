default_install_hook_types:
  - pre-commit

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-merge-conflict
      - id: check-json
      - id: check-toml
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace

  - repo: local
    hooks:
      - id: backend-sync
        name: Sync backend dependencies
        entry: python3 scripts/run_backend_sync.py
        language: system
        pass_filenames: false
        files: &backend_dependency_files ^(src/backend/(pyproject\.toml|uv\.lock))

      - id: frontend-install
        name: Install frontend dependencies
        entry: python3 scripts/run_frontend_install.py
        language: system
        pass_filenames: false
        files: &frontend_dependency_files ^(src/frontend/(package\.json|pnpm-lock\.yaml))

      - id: frontend-api-generate
        name: Generate frontend OpenAPI client
        entry: uv run --project src/backend python scripts/generate_frontend_openapi_client.py
        language: system
        pass_filenames: false
        files: &frontend_api_generation_files ^(specs/openapi/|scripts/generate_frontend_openapi_client\.py|src/frontend/shared/api/generated/)

      - id: backend-lint
        name: Run backend ruff --fix and format
        entry: python3 scripts/run_backend_lint_fix.py
        language: system
        pass_filenames: false
        files: &backend_files ^(src/backend/|migrations/|alembic\.ini|scripts/(run_backend_|check_backend_).+\.py)

      - id: backend-pyupgrade
        name: Run backend pyupgrade
        entry: python3 scripts/run_backend_pyupgrade.py
        language: system
        pass_filenames: false
        files: *backend_files

      - id: backend-architecture
        name: Validate backend architecture
        entry: uv run --project src/backend python scripts/check_backend_architecture.py
        language: system
        pass_filenames: false
        files: *backend_files

      - id: backend-observability
        name: Validate backend observability rules
        entry: uv run --project src/backend python scripts/check_backend_observability.py
        language: system
        pass_filenames: false
        files: *backend_files

      - id: backend-eradicate
        name: Run backend eradicate
        entry: python3 scripts/run_backend_eradicate.py
        language: system
        pass_filenames: false
        files: *backend_files

      - id: validate-adrs
        name: Validate ADR files and indexes
        entry: python3 scripts/check_adrs.py
        language: system
        pass_filenames: false

      - id: validate-repo-structure
        name: Validate repository structure
        entry: python3 scripts/check_repo_structure.py
        language: system
        pass_filenames: false

      - id: validate-specs
        name: Validate specs layout and naming
        entry: python3 scripts/check_specs.py
        language: system
        pass_filenames: false

      - id: validate-http-contract-parity
        name: Validate HTTP contract parity across spec backend and frontend
        entry: uv run --project src/backend python scripts/check_http_contract_parity.py
        language: system
        pass_filenames: false
        files: &http_contract_files ^(specs/openapi/|src/backend/api/|src/backend/apps/system/|src/backend/core/bootstrap/app\.py|src/frontend/entities/system/|src/frontend/shared/api/|tests/contract/|scripts/check_http_contract_parity\.py|scripts/generate_frontend_openapi_client\.py)

      - id: validate-template-consistency
        name: Validate template consistency
        entry: python3 scripts/check_template_consistency.py
        language: system
        pass_filenames: false

      - id: validate-frontend-architecture
        name: Validate frontend architecture
        entry: python3 scripts/check_frontend_architecture.py
        language: system
        pass_filenames: false
        files: &frontend_files ^(src/frontend/|scripts/(run_frontend_|check_frontend_).+\.py)

      - id: validate-ci-symmetry
        name: Validate CI symmetry
        entry: python3 scripts/check_ci_symmetry.py
        language: system
        pass_filenames: false

      - id: frontend-lint-fix
        name: Run frontend lint --fix
        entry: python3 scripts/run_frontend_lint_fix.py
        language: system
        pass_filenames: false
        files: *frontend_files

      - id: backend-tests
        name: Run backend tests
        entry: python3 scripts/run_backend_tests.py
        language: system
        pass_filenames: false
        files: *backend_files
        stages:
          - pre-commit

      - id: backend-lint-check
        name: Run backend lint checks
        entry: python3 scripts/run_backend_lint.py
        language: system
        pass_filenames: false
        files: *backend_files
        stages:
          - pre-commit

      - id: backend-types
        name: Run backend type checks
        entry: python3 scripts/run_backend_types.py
        language: system
        pass_filenames: false
        files: *backend_files
        stages:
          - pre-commit

      - id: backend-import-boundaries
        name: Run backend import boundary checks
        entry: python3 scripts/run_backend_import_boundaries.py
        language: system
        pass_filenames: false
        files: *backend_files
        stages:
          - pre-commit

      - id: frontend-types
        name: Run frontend type checks
        entry: python3 scripts/run_frontend_types.py
        language: system
        pass_filenames: false
        files: *frontend_files
        stages:
          - pre-commit

      - id: frontend-tests
        name: Run frontend unit tests
        entry: python3 scripts/run_frontend_tests.py
        language: system
        pass_filenames: false
        files: *frontend_files
        stages:
          - pre-commit

      - id: frontend-lint
        name: Run frontend lint
        entry: python3 scripts/run_frontend_lint.py
        language: system
        pass_filenames: false
        files: *frontend_files
        stages:
          - pre-commit
