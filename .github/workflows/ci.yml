name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - develop
      - "feature/**"

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - uses: astral-sh/setup-uv@v7

      - name: Sync backend dependencies
        run: make backend-sync

      - name: Check template invariants
        run: make check

      - name: Lint backend
        run: make backend-lint

      - name: Type-check backend
        run: make backend-types

      - name: Test backend
        run: make backend-test

      - name: Security-check backend
        run: make backend-security

  frontend:
    runs-on: ubuntu-latest
    needs:
      - backend
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: |
            src/frontend/pnpm-lock.yaml
            docs/pnpm-lock.yaml

      - name: Install frontend dependencies
        run: make frontend-install

      - name: Install docs dependencies
        run: make docs-install

      - name: Lint frontend
        run: make frontend-lint

      - name: Type-check frontend
        run: make frontend-types

      - name: Test frontend
        run: make frontend-test

      - name: Build frontend
        run: make frontend-build

      - name: Build docs
        run: make docs-build

  security-and-images:
    runs-on: ubuntu-latest
    needs:
      - frontend
    steps:
      - uses: actions/checkout@v6

      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Lint repository assets
        run: make repo-lint

      - name: Run trivy filesystem scan
        run: make repo-security

      - name: Build and tag container images
        run: make docker-build
