name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - develop
      - "feature/**"

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - uses: astral-sh/setup-uv@v6

      - name: Sync backend dependencies
        run: |
          cd src/backend
          uv sync --group dev

      - name: Validate ADR and repository structure
        run: |
          python3 scripts/check_adrs.py
          python3 scripts/check_repo_structure.py
          python3 scripts/check_backend_architecture.py
          python3 scripts/check_specs.py

      - name: Run backend quality checks
        run: |
          cd src/backend
          uv run ruff check api apps core runtime main.py tests
          uv run ruff format --check api apps core runtime main.py tests
          uv run mypy api apps core runtime main.py tests
          uv run lint-imports
          uv run bandit -q -r api apps core runtime -s B104,B105,B106
          uv run deptry . --config pyproject.toml --per-rule-ignores 'DEP002=alembic|asyncpg|greenlet|redis|taskiq'
          uv run tryceratops -i TRY003 -i TRY300 -i TRY301 -i TRY101 -i TRY203 -i TRY401 api apps core runtime main.py
          uv run xenon --max-absolute F --max-modules D --max-average A api apps core runtime main.py
          uv run pytest -x -q

      - name: Audit backend dependencies
        run: ./scripts/run_backend_pip_audit.sh

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: src/frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
        working-directory: src/frontend

      - name: Run frontend quality checks
        run: |
          pnpm lint
          pnpm type-check
          pnpm build
          pnpm test:unit
        working-directory: src/frontend

  security-and-images:
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Run shellcheck
        run: ./scripts/run_shellcheck.sh

      - name: Run hadolint
        run: docker run --rm -i hadolint/hadolint < docker/Dockerfile

      - name: Run trivy filesystem scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          exit-code: "1"

      - name: Build and tag container images
        run: |
          BRANCH="${GITHUB_REF_NAME//\//-}"
          BACKEND_IMAGE="registry.local/template-backend"
          FRONTEND_IMAGE="registry.local/template-frontend"

          docker build -f docker/Dockerfile --target backend -t "$BACKEND_IMAGE:${{ github.sha }}" .
          docker tag "$BACKEND_IMAGE:${{ github.sha }}" "$BACKEND_IMAGE:latest"
          docker tag "$BACKEND_IMAGE:${{ github.sha }}" "$BACKEND_IMAGE:$BRANCH"

          docker build -f docker/Dockerfile --target frontend -t "$FRONTEND_IMAGE:${{ github.sha }}" .
          docker tag "$FRONTEND_IMAGE:${{ github.sha }}" "$FRONTEND_IMAGE:latest"
          docker tag "$FRONTEND_IMAGE:${{ github.sha }}" "$FRONTEND_IMAGE:$BRANCH"
